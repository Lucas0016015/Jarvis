# ── JARVIS Production Docker Compose ─────────────────────────
# Usage:
#   docker-compose -f docker-compose.yml up -d
#   docker-compose -f docker-compose.yml up -d --build
# ═══════════════════════════════════════════════════════════════

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: jarvis-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - jarvis-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: jarvis-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://backend:8000
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - jarvis-network

networks:
  jarvis-network:
    name: jarvis-network
    driver: bridge

volumes:
  jarvis-data:
    driver: local
