# JARVIS Railway Deployment
# Solo backend (FastAPI). Frontend deploya aparte en Vercel.

[deploy]
startCommand = "python -m uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/v1/health"
healthcheckPort = $PORT
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.backend"

[nixpacks]
# Python 3.12 con Nixpacks (alternativa a Dockerfile)
# Si Dockerfile falla, Railway puede usar esto:
# providers = ["python"]
# [phases.build]
# cmds = ["pip install -r requirements.txt"]
# [phases.setup]
# aptPkgs = ["ffmpeg", "espeak-ng", "libportaudio2"]
