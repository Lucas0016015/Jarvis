# JARVIS Railway Deployment
# Solo backend (FastAPI). Frontend deploya aparte en Vercel.
# El CMD del Dockerfile se encarga del puerto (sh -c con ${PORT:-8000})

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.backend"
