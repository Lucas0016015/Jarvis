# JARVIS Railway Deployment
# Cada servicio se configura manualmente en el dashboard de Railway:
# Servicio "jarvis" (backend):   Root=/,           Dockerfile=Dockerfile.backend  Port=8000
# Servicio "front-end":          Root=/web-next,   Dockerfile=Dockerfile          Port=3000

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
